; =============================================================================
; Touch_LCD_2_SX1262_L76K ESP32-S3 开发板配置
; =============================================================================
; 硬件规格:
; - 主控: ESP32-S3
; - 屏幕: 2寸 240×320 ST7789 TFT LCD
; - 触摸: CST816D 电容触控芯片
; - LoRa: SX1262 射频芯片
; - GPS: L76K 模组，支持 GPS 和 BD 等定位功能
; =============================================================================

; ==== 编译环境 ====
[env:touch_lcd_2_sx1262_l76k]
extends = esp32s3_base                              ; 继承名为 esp32s3_base 的父环境配置
board = touch_lcd_2_sx1262_l76k                     ; 是否为自定义板型（需在 boards/ 目录提供 JSON 定义文件）
board_build.partitions = default_16MB.csv           ; 指定分区表文件（16MB Flash）
; board_check = true                                ; 编译前会检查 board 字段是否有效，若无效则报错

; ==== 调试配置 ====
; debug_port = COM4                                 ; 指定端口号 自动选择
; debug_tool = esp-builtin                          ; 使用内置USB-JTAG

; ==== 下载配置 ====
; upload_protocol = esp-builtin                     ; 使用内置USB-JTAG
upload_protocol = esptool                           ; 使用 esptool 而不是 esp-builtin 来避免工具链问题
upload_speed = 921600                               ; 上传波特率

; ==== 串口监视配置 ====
; monitor_port = COM4                               ; 指定端口号 自动选择
monitor_speed = 115200                              ; 指定波特率
monitor_filters = esp32_exception_decoder           ; 当 ESP32 运行时发生崩溃（如内存错误、断言失败、看门狗触发等），会输出 十六进制格式的异常调用栈

; ==== 编译配置 ====
build_unflags = -flto                               ; 禁用 LTO 优化以避免链接问题
; build_type = debug                                ; 配置构建模式的关键参数 debug / release 模式
build_flags =                                       ; 向底层编译器传递额外的编译选项和宏定义
    ${esp32s3_base.build_flags}                     ; 继承预先定义的 esp32s3_base 配置中的基础编译标志
    ; ==== 硬件定义 ====
    -D TOUCH_LCD_2_SX1262_L76K                      ; 定义宏 TOUCH_LCD_2_SX1262_L76K
    -D PRIVATE_HW                                   ; 标记该项目使用私有硬件设计（非标准开发板）
    -I variants/esp32s3/Touch_LCD_2_SX1262_L76K     ; 添加头文件搜索路径，指向自定义硬件配置目录
    ; ==== 日志定义 ====
    ; -D ARDUINO_USB_MODE=0                           ; 启用USB模式
    ; -D ARDUINO_USB_CDC_ON_BOOT=0                    ; 启动时自动初始化USB CDC
    ; -D CONFIG_ARDUHAL_LOG_COLORS=1                  ; 启用日志颜色
    ; ==== C++ 特性 ====
    -faligned-new                                   ; 启用 C++17 对齐 new 支持（SX1262Interface 需要 16 字节对齐）
                                                    ; 注意: 此标志在编译 C 文件时会产生警告（仅适用于 C++），这是正常的，不影响编译
    ; ==== 编译优化 ====
    ; -Og                                           ; 启用调试符号，不可以拆开 O g
    ; -ggdb3                                        ; 生成GDB调试信息，不可以拆开 g gdb3
    -fno-strict-aliasing                            ; 解决类型不匹配警告
    ; ==== 警告抑制（第三方库）====
    -Wno-odr                                        ; 禁用 One Definition Rule 警告
    -Wno-lto-type-mismatch                          ; 禁用 LTO 类型不匹配警告
    -Wno-format                                     ; 禁用格式警告
    -Wno-unused-variable                            ; 禁用未使用变量警告（第三方库）
    -Wno-parentheses                                ; 禁用括号建议警告（第三方库）
    -Wno-type-limits                                ; 禁用类型限制警告（第三方库）
    -Wno-implicit-fallthrough                       ; 禁用 switch case fall through 警告
    -Wno-deprecated-declarations                    ; 禁用废弃 API 声明警告（LovyanGFX）
    -Wno-ignored-qualifiers                         ; 禁用类型限定符被忽略警告（aes-ccm）
    -Wno-array-bounds                               ; 禁用数组越界警告（DFRobot_RTU 使用柔性数组成员）
    ; ==== 注意事项 ====
    ; 1. NO_DATA, I2C_BUFFER_LENGTH 等宏重定义警告来自第三方库冲突，无法通过编译标志抑制，可安全忽略
    ; 2. -faligned-new 在编译 C 文件时会产生警告（仅适用于 C++），这是正常的，不影响编译

; ==== 依赖库配置 ====
lib_deps =
    ${esp32s3_base.lib_deps}                        ; 继承 esp32s3_base 配置中定义的基础库依赖
    lovyan03/LovyanGFX@1.2.0                        ; LovyanGFX 图形库（限定固定版本，不要使用新版本，编译报错）
