; =============================================================================
; Touch_LCD_2_SX1262_L76K ESP32-S3 开发板配置
; =============================================================================
; 硬件规格:
; - 主控: ESP32-S3
; - 屏幕: 2寸 240×320 ST7789 TFT LCD
; - 触摸: CST816D 电容触控芯片
; - LoRa: SX1262 射频芯片
; - GPS: L76K 模组，支持 GPS 和 BD 等定位功能
; =============================================================================

; ==== 基础配置 ====
[env:touch_lcd_2_sx1262_l76k]
extends = esp32s3_base
board = touch_lcd_2_sx1262_l76k
board_build.partitions = default_16MB.csv
upload_protocol = esptool  ; 使用esptool而不是esp-builtin来避免工具链问题
build_unflags = -flto  ; 禁用LTO优化以避免链接问题
build_flags =
    ${esp32s3_base.build_flags}
    -I variants/esp32s3/Touch_LCD_2_SX1262_L76K ; 添加自定义硬件头文件路径, 本文件夹路径
    -D TOUCH_LCD_2_SX1262_L76K ; 定义自定义硬件，自动映射为 meshtastic_HardwareModel_PRIVATE_HW (目前没有添加映射)
    -D PRIVATE_HW  ; 定义自定义硬件，自动映射为 meshtastic_HardwareModel_PRIVATE_HW
    -Wno-odr  ; 禁用One Definition Rule警告
    -fno-strict-aliasing  ; 解决类型不匹配警告
    -Wno-lto-type-mismatch  ; 禁用LTO类型不匹配警告
    -Wno-format  ; 禁用格式警告
lib_deps =
    ${esp32s3_base.lib_deps}
    lovyan03/LovyanGFX@1.2.0 # 限定固定版本, 不要使用新版本, 编译报错
    https://github.com/meshtastic/st7789/archive/bd33ea58ddfe4a5e4a66d53300ccbd38d66ac21f.zip ; st7789 驱动库
upload_speed = 921600